<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="images/svg/lc_logo_custom_duo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/schemecontrol.css">
  <script type="module" src="js/script.js"></script>
  <title>Tic Tac Toe 0o32</title>
</head>
<body>
  <header>
    <img src="images/svg/lc_logo_custom_duo.svg"  class="lc-logo" type="image/svg+xml" width="48">
    <button type="button" class="scheme-control-button"></button>
  </header>
  <main>
    <div class="game-board">
      <button type="button" class="field" value="0"></button>
      <button type="button" class="field" value="1"></button>
      <button type="button" class="field" value="2"></button>
      <button type="button" class="field" value="3"></button>
      <button type="button" class="field" value="4"></button>
      <button type="button" class="field" value="5"></button>
      <button type="button" class="field" value="6"></button>
      <button type="button" class="field" value="7"></button>
      <button type="button" class="field" value="8"></button>
    </div>
  </main>
  <footer>
    &copy LastCapricorn 2026
  </footer>
</body>
</html>
